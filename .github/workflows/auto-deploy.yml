name: 🕛 每日定时自动更新博客

on:
  schedule:
    # 每天 UTC 16:00 = 北京时间 00:00
    - cron: '0 16 * * *'
  # 允许手动触发
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📦 检出博客源码
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: 📦 检出主题（InkSerenity）
        run: |
          git clone https://github.com/tandc181123/hexo-theme-InkSerenity.git themes/InkSerenity

      - name: ⚙️ 配置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📥 安装依赖
        run: npm install

      - name: 🔑 配置 SSH 部署密钥与 git 信息
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

      - name: 🏗️ 编译 Hexo 博客
        run: npx hexo clean && npx hexo generate

      - name: 🚀 部署到 GitHub Pages
        run: npx hexo deploy

      - name: 📋 更新 README（同步 LIST.md）
        run: |
          cp LIST.md README.md
          git add README.md LIST.md
          git diff --staged --quiet || git commit -m "🤖 Auto-update: LIST.md & README.md ($(date '+%Y-%m-%d %H:%M'))"
          git push origin main
